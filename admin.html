<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-RESIDENCE - Executive Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght=600;700&family=Plus+Jakarta+Sans:wght=400;500;600;700&display=swap');
        body {
            background-color: #0B0C0E;
            color: #F1F5F9;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-image: radial-gradient(circle at top left, rgba(212, 175, 55, 0.03), transparent 40%);
        }
        .font-luxury { font-family: 'Cinzel', serif; }
        .luxury-card { 
            background: rgba(22, 26, 30, 0.8); 
            border: 1px solid rgba(212, 175, 55, 0.15); 
            backdrop-filter: blur(16px);
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.5);
        }
        .gold-gradient { background: linear-gradient(135deg, #AA7C11 0%, #D4AF37 100%); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto space-y-8">
        
        <!-- HEADER -->
        <header class="flex flex-col md:flex-row justify-between items-center bg-[#161A1E] border border-white/5 rounded-3xl p-6 gap-4">
            <div>
                <h1 class="font-luxury text-xl md:text-2xl font-bold tracking-widest text-[#D4AF37]">CONTROL PANEL</h1>
                <p class="text-xs text-gray-400 mt-1">Sistem Manajemen Pengguna & Pengaturan E-Residence</p>
            </div>
            <div class="flex items-center gap-2 text-xs bg-emerald-500/10 border border-emerald-500/20 px-4 py-2 rounded-xl text-emerald-400">
                <span class="w-2 h-2 bg-emerald-400 rounded-full animate-ping"></span>
                Sistem Terhubung Real-Time
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- PANEL KIRI: SYSTEM SETTINGS -->
            <section class="luxury-card rounded-3xl p-6 space-y-5 h-fit">
                <h2 class="text-sm font-bold text-white uppercase tracking-wider border-b border-white/5 pb-3 flex items-center gap-2">
                    <svg class="w-4 h-4 text-[#D4AF37]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    Konfigurasi Sistem
                </h2>

                <!-- Nama Web -->
                <div class="space-y-1.5">
                    <label class="text-[10px] text-gray-400 uppercase tracking-wider font-semibold">Nama Website Branding</label>
                    <input type="text" id="cfg-nama-web" class="w-full bg-[#0D0F11] border border-white/5 rounded-xl px-3.5 py-2.5 text-xs text-white focus:outline-none focus:border-[#D4AF37]">
                </div>

                <!-- Google Maps -->
                <div class="space-y-1.5">
                    <label class="text-[10px] text-gray-400 uppercase tracking-wider font-semibold">Link Google Maps Lokasi</label>
                    <input type="text" id="cfg-maps" class="w-full bg-[#0D0F11] border border-white/5 rounded-xl px-3.5 py-2.5 text-xs text-white focus:outline-none focus:border-[#D4AF37]" placeholder="https://maps.google.com/...">
                </div>

                <!-- Input Link URL QRIS -->
                <div class="space-y-1.5">
                    <label class="text-[10px] text-gray-400 uppercase tracking-wider font-semibold">Link URL Gambar QRIS</label>
                    <input type="text" id="cfg-qris-url" class="w-full bg-[#0D0F11] border border-white/5 rounded-xl px-3.5 py-2.5 text-xs text-white focus:outline-none focus:border-[#D4AF37]" placeholder="https://i.ibb.co/example/qris.jpg">
                    <p class="text-[10px] text-gray-500 italic">Tempel tautan langsung gambar QRIS yang di-host di ImgBB/hosting lain.</p>
                </div>

                <button onclick="simpanKonfigurasiSistem()" id="btn-save-config" class="w-full py-3 gold-gradient text-[#121414] font-bold text-xs tracking-wider rounded-xl uppercase transition hover:opacity-90 shadow-lg">
                    SIMPAN SEMUA PERUBAHAN
                </button>
            </section>

            <!-- PANEL KANAN: LIVE USER MONITOR -->
            <section class="luxury-card rounded-3xl p-6 lg:col-span-2 space-y-4">
                <div class="flex justify-between items-center border-b border-white/5 pb-3">
                    <h2 class="text-sm font-bold text-white uppercase tracking-wider flex items-center gap-2">
                        <svg class="w-4 h-4 text-[#D4AF37]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 3a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                        Antrean Pemohon Hunian
                    </h2>
                    <button onclick="muatDaftarUser()" class="text-[11px] px-3 py-1.5 bg-white/5 border border-white/10 rounded-lg hover:bg-white/10 transition text-gray-300">
                        Refresh Data
                    </button>
                </div>

                <!-- CONTAINER LIST KARTU USER -->
                <div id="user-list-container" class="space-y-4 max-h-[600px] overflow-y-auto pr-1">
                    <p class="text-xs text-gray-500 italic text-center py-8">Sedang sinkronisasi data pendaftar...</p>
                </div>
            </section>

        </div>
    </div>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        const API_BASE = "https://6a2babdb3e2b60ab038e98af.mockapi.io";
        let configId = "1"; 

        window.addEventListener('DOMContentLoaded', () => {
            ambilKonfigurasiSistem();
            muatDaftarUser();
            
            // Loop data pendaftar otomatis setiap 4 detik untuk melacak input baru user
            setInterval(muatDaftarUser, 4000);
        });

        // 1. MANAJEMEN PENGATURAN GLOBAL (NAMA WEBSITE, MAPS, QRIS LINK)
        async function ambilKonfigurasiSistem() {
            try {
                const res = await fetch(`${API_BASE}/setting/${configId}`);
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('cfg-nama-web').value = data.nama_web || "";
                    document.getElementById('cfg-maps').value = data.maps_url || "";
                    document.getElementById('cfg-qris-url').value = data.qris_url || "";
                }
            } catch (e) { console.log("Gagal memuat setting sistem."); }
        }

        async function simpanKonfigurasiSistem() {
            const namaWeb = document.getElementById('cfg-nama-web').value.trim();
            const mapsUrl = document.getElementById('cfg-maps').value.trim();
            const qrisUrl = document.getElementById('cfg-qris-url').value.trim();
            
            const btn = document.getElementById('btn-save-config');
            btn.disabled = true; btn.innerText = "MENYIMPAN...";

            try {
                const payload = { nama_web: namaWeb, maps_url: mapsUrl, qris_url: qrisUrl };
                const res = await fetch(`${API_BASE}/setting/${configId}`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                if(res.ok) {
                    alert("Konfigurasi sistem berhasil diperbarui secara global!");
                } else {
                    alert("Gagal memperbarui konfigurasi di server.");
                }
            } catch (e) {
                alert("Gangguan koneksi internet.");
            } finally {
                btn.disabled = false; btn.innerText = "SIMPAN SEMUA PERUBAHAN";
            }
        }

        // 2. TIMELINE AKSI PENGGUNA (ACC, KONFIRMASI LUNAS, TOLAK, BAN/PRANK)
        async function muatDaftarUser() {
            try {
                const res = await fetch(`${API_BASE}/users`);
                if(!res.ok) return;
                const users = await res.json();
                
                // Urutkan berdasarkan ID terbesar (Pendaftar terbaru selalu di atas)
                users.sort((a, b) => b.id - a.id);

                const container = document.getElementById('user-list-container');
                if(users.length === 0) {
                    container.innerHTML = `<p class="text-xs text-gray-500 italic text-center py-8">Belum ada data pengajuan reservasi.</p>`;
                    return;
                }

                let htmlContent = "";
                users.forEach(user => {
                    let statusBadge = "";
                    if(user.status.includes('waiting')) statusBadge = `<span class="px-2 py-0.5 text-[9px] bg-amber-500/10 text-amber-400 border border-amber-500/20 rounded-md font-bold uppercase">MENUNGGU ACC</span>`;
                    else if(user.status === 'sukses') statusBadge = `<span class="px-2 py-0.5 text-[9px] bg-blue-500/10 text-blue-400 border border-blue-500/20 rounded-md font-bold uppercase">DI-ACC (BLM BAYAR)</span>`;
                    else if(user.status === 'sukses_lunas') statusBadge = `<span class="px-2 py-0.5 text-[9px] bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 rounded-md font-bold uppercase">LUNAS / SELESAI</span>`;
                    else if(user.status === 'tolak') statusBadge = `<span class="px-2 py-0.5 text-[9px] bg-red-500/10 text-red-400 border border-red-500/20 rounded-md font-bold uppercase">DITOLAK</span>`;
                    
                    if(user.prank === true || user.prank === "true") {
                        statusBadge = `<span class="px-2 py-0.5 text-[9px] bg-purple-500/10 text-purple-400 border border-purple-500/20 rounded-md font-bold uppercase">🚨 BANNED / PRANK</span>`;
                    }

                    htmlContent += `
                    <div class="bg-[#121417] border border-white/5 rounded-2xl p-4 flex flex-col md:flex-row justify-between gap-4 items-start md:items-center hover:border-white/10 transition">
                        <div class="space-y-1">
                            <div class="flex items-center gap-2 flex-wrap">
                                <h3 class="text-xs font-bold text-white tracking-wide">${user.nama} <span class="text-gray-500 font-normal">(${user.umur} Thn - ${user.tempat_lahir})</span></h3>
                                ${statusBadge}
                            </div>
                            <p class="text-[11px] text-[#D4AF37] font-medium">Paket Tagihan: ${user.id_kamar || 'Belum dipilih'}</p>
                            <p class="text-[11px] text-gray-400">WhatsApp Kontak: <span class="font-mono text-gray-300">${user.alamat || 'N/A'}</span></p>
                        </div>
                        
                        <!-- PANEL CONTROL STRIP UTK TINDAKAN ADMIN -->
                        <div class="flex items-center gap-1.5 w-full md:w-auto flex-wrap">
                            <!-- 1. Tombol ACC Pertama (Mengirim QRIS ke user) -->
                            <button onclick="ubahStatusUser('${user.id}', 'sukses')" class="text-[10px] font-bold px-2.5 py-1.5 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition uppercase">
                                ACC Unit
                            </button>
                            
                            <!-- 2. Tombol Konfirmasi Lunas (Mengirim Kartu Informasi Satpam/Kasir) -->
                            <button onclick="ubahStatusUser('${user.id}', 'sukses_lunas')" class="text-[10px] font-bold px-2.5 py-1.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg transition uppercase">
                                Konfirmasi Lunas
                            </button>

                            <!-- 3. Tombol Tolak Berkas -->
                            <button onclick="ubahStatusUser('${user.id}', 'tolak')" class="text-[10px] font-semibold px-2.5 py-1.5 bg-gray-800 hover:bg-gray-700 text-gray-300 rounded-lg transition uppercase">
                                Tolak
                            </button>

                            <!-- 4. Tombol Ban Prank (Trigger Rickroll Video) -->
                            <button onclick="eksekusiBannedPrank('${user.id}')" class="text-[10px] font-bold px-2.5 py-1.5 bg-purple-900/40 hover:bg-purple-900 border border-purple-800 text-purple-300 rounded-lg transition uppercase">
                                Ban Prank
                            </button>

                            <!-- 5. Hapus Log User Selamanya -->
                            <button onclick="hapusUserData('${user.id}')" class="text-[10px] p-1.5 bg-red-950/40 hover:bg-red-900/60 border border-red-900/50 text-red-400 rounded-lg transition" title="Hapus Permanen">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    </div>
                    `;
                });

                container.innerHTML = htmlContent;
            } catch (err) { console.log("Gagal menyegarkan antrean."); }
        }

        async function ubahStatusUser(id, statusBaru) {
            try {
                const res = await fetch(`${API_BASE}/users/${id}`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ status: statusBaru })
                });
                if(res.ok) { muatDaftarUser(); }
            } catch(e) { alert("Gagal memperbarui status user."); }
        }

        async function eksekusiBannedPrank(id) {
            if(!confirm("Apakah Anda yakin ingin memberikan penalti Banned-Prank (Rickroll) pada pengguna ini?")) return;
            try {
                const res = await fetch(`${API_BASE}/users/${id}`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prank: true })
                });
                if(res.ok) { muatDaftarUser(); }
            } catch(e) { alert("Gagal melakukan penangguhan."); }
        }

        async function hapusUserData(id) {
            if(!confirm("Hapus data secara permanen dari log database?")) return;
            try {
                const res = await fetch(`${API_BASE}/users/${id}`, { method: "DELETE" });
                if(res.ok) { muatDaftarUser(); }
            } catch(e) { alert("Gagal menghapus."); }
        }
    </script>
</body>
</html>
