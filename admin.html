<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-RESIDENCE ADMIN PANEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold text-yellow-500">ADMIN DASHBOARD</h1>
            <button onclick="location.reload()" class="bg-slate-700 px-4 py-2 rounded-lg text-sm hover:bg-slate-600">Refresh Data</button>
        </header>

        <!-- PENGATURAN BRANDING -->
        <div class="bg-slate-800 p-6 rounded-xl mb-8 border border-slate-700">
            <h2 class="text-lg font-semibold mb-4">Pengaturan Global</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="text" id="set-nama" placeholder="Nama Web" class="bg-slate-900 p-2 rounded border border-slate-700">
                <input type="text" id="set-maps" placeholder="URL Google Maps" class="bg-slate-900 p-2 rounded border border-slate-700">
                <input type="text" id="set-qris" placeholder="URL Gambar QRIS" class="bg-slate-900 p-2 rounded border border-slate-700">
            </div>
            <button onclick="simpanSetting()" class="mt-4 bg-yellow-600 text-white px-6 py-2 rounded font-bold hover:bg-yellow-500">SIMPAN KONFIGURASI</button>
        </div>

        <!-- TABEL DATA USER -->
        <div class="bg-slate-800 rounded-xl overflow-hidden border border-slate-700">
            <table class="w-full text-left text-sm">
                <thead class="bg-slate-900 uppercase">
                    <tr>
                        <th class="p-4">Nama</th>
                        <th class="p-4">Durasi/Biaya</th>
                        <th class="p-4">Status</th>
                        <th class="p-4">Aksi</th>
                    </tr>
                </thead>
                <tbody id="user-table">
                    <!-- Data masuk otomatis via JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_BASE = "https://6a2babdb3e2b60ab038e98af.mockapi.io";

        async function loadData() {
            const res = await fetch(`${API_BASE}/users`);
            const users = await res.json();
            const tbody = document.getElementById('user-table');
            tbody.innerHTML = '';

            users.reverse().forEach(u => {
                tbody.innerHTML += `
                    <tr class="border-t border-slate-700">
                        <td class="p-4">${u.nama}<br><span class="text-xs text-slate-400">Umur: ${u.umur} | WA: ${u.alamat}</span></td>
                        <td class="p-4 font-mono">${u.id_kamar}</td>
                        <td class="p-4"><span class="px-2 py-1 rounded text-[10px] uppercase font-bold bg-slate-700">${u.status}</span></td>
                        <td class="p-4 space-x-2">
                            <button onclick="updateStatus('${u.id}', 'sukses')" class="bg-blue-600 px-3 py-1 rounded text-xs">ACC</button>
                            <button onclick="updateStatus('${u.id}', 'sukses_lunas')" class="bg-emerald-600 px-3 py-1 rounded text-xs">LUNAS</button>
                            <button onclick="updateStatus('${u.id}', 'tolak')" class="bg-red-600 px-3 py-1 rounded text-xs">TOLAK</button>
                            <button onclick="updateStatus('${u.id}', 'prank')" class="bg-purple-600 px-3 py-1 rounded text-xs">PRANK</button>
                        </td>
                    </tr>
                `;
            });
        }

        async function updateStatus(id, status) {
            const payload = (status === 'prank') ? { prank: true } : { status: status };
            await fetch(`${API_BASE}/users/${id}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            loadData();
        }

        async function simpanSetting() {
            const data = {
                nama_web: document.getElementById('set-nama').value,
                maps_url: document.getElementById('set-maps').value,
                qris_url: document.getElementById('set-qris').value
            };
            await fetch(`${API_BASE}/setting/1`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });
            alert("Konfigurasi disimpan!");
        }

        loadData();
        setInterval(loadData, 5000);
    </script>
</body>
</html>
