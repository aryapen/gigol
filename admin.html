<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gigol - Admin Control Room</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #06020f; color: #fff; font-family: 'Tomorrow', sans-serif; overflow-y: auto; }
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght=700&family=Tomorrow:wght=500;700&display=swap');
        .font-admin-logo { font-family: 'Syncopate', sans-serif; }
        .border-neon-cyan { border: 2px solid #00ffff; box-shadow: 0 0 20px rgba(0, 255, 255, 0.2); }
        .btn-cyan { background: linear-gradient(90deg, #00ffff, #3b82f6); box-shadow: 0 0 15px rgba(0, 255, 255, 0.4); }
        .btn-cyan:hover:not(:disabled) { box-shadow: 0 0 25px #00ffff, 0 0 40px #3b82f6; transform: scale(1.02); }
        .card-tamu { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(0, 255, 255, 0.15); transition: all 0.2s; }
        .card-tamu:hover { border-color: #00ffff; box-shadow: 0 0 15px rgba(0, 255, 255, 0.2); background: rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex flex-col items-center justify-start space-y-8">

    <!-- OVERLAY GERBANG KEAMANAN PASSWORD -->
    <div id="auth-overlay" class="fixed inset-0 bg-[#06020f] z-50 flex items-center justify-center p-4">
        <div class="w-full max-w-sm bg-[#0f091e] border-neon-cyan p-6 rounded-3xl text-center space-y-5">
            <h2 class="font-admin-logo text-sm font-bold text-cyan-400 tracking-widest">SECURE AUTHENTICATION</h2>
            <p class="text-[11px] text-gray-400 uppercase tracking-wider">Masukkan Sandi Command Center</p>
            <div class="space-y-3">
                <input type="password" id="input-sandi" placeholder="••••••••" class="w-full bg-black/40 border border-cyan-900/60 rounded-xl px-4 py-3 text-center text-sm text-cyan-400 focus:outline-none focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 tracking-widest">
                <button onclick="verifikasiSandi()" class="btn-cyan w-full py-3 rounded-xl text-xs font-bold tracking-widest uppercase">MASUK PANEL</button>
            </div>
            <p id="error-sandi" class="hidden text-xs text-red-500 font-bold animate-pulse">❌ SANDI SALAH! AKSES DITOLAK.</p>
        </div>
    </div>

    <!-- MAIN DASHBOARD CONTENT (Hidden sebelum sukses login) -->
    <div id="main-dashboard" class="hidden w-full max-w-3xl flex flex-col items-center space-y-8">
        
        <!-- PANEL 1: MANAGEMENT UPDATE QRIS -->
        <div class="w-full bg-[#0f091e]/90 p-6 rounded-3xl border-neon-cyan backdrop-blur-md grid grid-cols-1 md:grid-cols-2 gap-6 items-center">
            <div>
                <h1 class="font-admin-logo text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 tracking-wider mb-2">GIGOL HQ</h1>
                <p class="text-xs text-gray-400 uppercase tracking-widest mb-6">— Admin Command Center —</p>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs text-cyan-400 uppercase tracking-wider mb-2 font-semibold">Upload File QRIS Baru</label>
                        <input type="file" id="file-qris" accept="image/*" class="w-full text-xs text-gray-400 file:mr-3 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-bold file:bg-cyan-950 file:text-cyan-400 hover:file:bg-cyan-900 cursor-pointer border border-cyan-900/40 p-2 rounded-xl bg-black/20">
                    </div>
                    <button onclick="uploadProses()" id="btn-upload" class="btn-cyan w-full py-3 rounded-xl font-bold text-xs tracking-widest uppercase transition duration-300">UPDATE QRIS ONLINE</button>
                    <div id="status-msg" class="hidden text-[11px] text-center font-bold tracking-wide animate-pulse"></div>
                </div>
            </div>
            <div class="text-center flex flex-col items-center border-t md:border-t-0 md:border-l border-cyan-950 pt-4 md:pt-0 md:pl-6">
                <label class="block text-xs text-cyan-400 uppercase tracking-wider mb-3 font-semibold">QRIS Aktif Saat Ini</label>
                <div class="bg-white p-2 rounded-2xl inline-block shadow-md">
                    <img id="current-qris-preview" src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=TokoGigolVIP" class="w-32 h-32 object-cover rounded-xl">
                </div>
            </div>
        </div>

        <!-- PANEL 2: LIVE GUESTLIST TAMU & MODERASI -->
        <div class="w-full bg-[#0f091e]/90 p-6 rounded-3xl border border-purple-500/30 shadow-[0_0_20px_rgba(147,51,234,0.05)]">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 class="font-admin-logo text-sm font-bold text-purple-400 tracking-wider">LIVE GUESTLIST & MODERATION</h2>
                    <p class="text-[10px] text-gray-400 uppercase tracking-widest">Kendalikan hak akses user secara real-time</p>
                </div>
                <button onclick="loadTamuDariMockAPI()" class="bg-purple-950/60 hover:bg-purple-900 text-purple-300 text-xs px-4 py-2 rounded-xl border border-purple-800 transition font-bold tracking-wider">🔄 REFRESH</button>
            </div>
            <!-- Tempat list data pendaftar muncul -->
            <div id="container-tamu" class="space-y-4 max-h-[600px] overflow-y-auto pr-1">
                <p class="text-xs text-center text-gray-500 py-6 animate-pulse">Memuat data pendaftar...</p>
            </div>
        </div>

    </div>

    <!-- SYSTEM SYSTEM SCRIPT -->
    <script>
        // KATA SANDI PANEL ADMIN (Silakan ganti teks 'admin123' sesuai keinginanmu)
        const PASSWORD_PANEL = "admin123";

        const IMGBB_API_KEY = "9e664fd88a28686913de4aea12579904";
        const BASE_MOCKAPI_URL = "https://6a2babdb3e2b60ab038e98af.mockapi.io";
        
        const MOCKAPI_SETTING_URL = `${BASE_MOCKAPI_URL}/setting/1`; 
        const MOCKAPI_USERS_URL = `${BASE_MOCKAPI_URL}/users`;

        // Interseptor enter pada input password
        document.getElementById('input-sandi').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') verifikasiSandi();
        });

        // 0. Fungsi Otentikasi Keamanan
        function verifikasiSandi() {
            const inputSandi = document.getElementById('input-sandi').value;
            const errorMsg = document.getElementById('error-sandi');
            
            if (inputSandi === PASSWORD_PANEL) {
                document.getElementById('auth-overlay').classList.add('hidden');
                document.getElementById('main-dashboard').classList.remove('hidden');
                
                // Mulai panggil data internal sesudah terverifikasi
                loadQRISPreview(); 
                loadTamuDariMockAPI(); 
            } else {
                errorMsg.classList.remove('hidden');
                document.getElementById('input-sandi').value = "";
                document.getElementById('input-sandi').focus();
            }
        }

        // 1. Ambil QRIS yang lagi aktif dari server
        async function loadQRISPreview() {
            try {
                const response = await fetch(MOCKAPI_SETTING_URL);
                if (response.ok) {
                    const data = await response.json();
                    if (data.qris_url) document.getElementById('current-qris-preview').src = data.qris_url;
                }
            } catch (err) { console.log("Belum ada data QRIS."); }
        }

        // 2. Ambil list data pendaftar dari MockAPI
        async function loadTamuDariMockAPI() {
            const container = document.getElementById('container-tamu');
            try {
                const response = await fetch(MOCKAPI_USERS_URL);
                const users = await response.json();
                container.innerHTML = ""; 

                if (users.length === 0) {
                    container.innerHTML = `<p class="text-xs text-center text-gray-500 py-6">Belum ada tamu yang mendaftar.</p>`;
                    return;
                }

                users.reverse().forEach(tamu => {
                    let statusColor = "text-yellow-400 bg-yellow-950/40 border-yellow-800";
                    if(tamu.status === "approved") statusColor = "text-green-400 bg-green-950/40 border-green-800";
                    if(tamu.status === "banned") statusColor = "text-red-400 bg-red-950/40 border-red-800";

                    const card = document.createElement('div');
                    card.className = "card-tamu p-4 rounded-2xl flex flex-col md:flex-row md:items-center justify-between gap-4";
                    card.innerHTML = `
                        <div class="space-y-1 flex-1">
                            <div class="flex flex-wrap items-center gap-2">
                                <span class="text-sm font-bold text-white">${tamu.nama}</span>
                                <span class="text-[10px] bg-cyan-950 text-cyan-400 font-bold px-2 py-0.5 rounded border border-cyan-800">${tamu.umur} Thn</span>
                                <span class="text-[10px] ${statusColor} font-bold px-2 py-0.5 rounded border uppercase">${tamu.status || 'pending'}</span>
                                ${tamu.prank ? '<span class="text-[10px] text-pink-400 bg-pink-950/40 border border-pink-800 font-bold px-2 py-0.5 rounded uppercase animate-pulse">🎭 PRANK ACTIVE</span>' : ''}
                            </div>
                            <p class="text-xs text-gray-400"><span class="text-purple-400">TTL:</span> ${tamu.tempat_lahir}, ${tamu.tanggal_lahir} | <span class="text-purple-400">Alamat:</span> ${tamu.alamat}</p>
                        </div>
                        <div class="flex flex-wrap gap-2 items-center">
                            <button onclick="updateUserStatus('${tamu.id}', 'approved')" class="bg-green-600 hover:bg-green-700 text-white text-[11px] font-bold px-3 py-1.5 rounded-xl transition">ACC</button>
                            <button onclick="updateUserPrank('${tamu.id}', ${!tamu.prank})" class="bg-pink-600 hover:bg-pink-700 text-white text-[11px] font-bold px-3 py-1.5 rounded-xl transition">PRANK</button>
                            <button onclick="updateUserStatus('${tamu.id}', 'banned')" class="bg-red-600 hover:bg-red-700 text-white text-[11px] font-bold px-3 py-1.5 rounded-xl transition">BAN</button>
                            <button onclick="hapusUser('${tamu.id}')" class="bg-gray-800 hover:bg-gray-700 text-gray-400 text-[11px] font-bold px-2 py-1.5 rounded-xl transition">🗑️</button>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) { 
                container.innerHTML = `<p class="text-xs text-center text-red-400 py-6">⚠️ Gagal memuat data dari MockAPI.</p>`; 
            }
        }

        // 3. Ubah Status
        async function updateUserStatus(id, statusBaru) {
            try {
                await fetch(`${MOCKAPI_USERS_URL}/${id}`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ status: statusBaru })
                });
                loadTamuDariMockAPI();
            } catch (err) { alert("Gagal memperbarui status user."); }
        }

        // 4. Mode Prank
        async function updateUserPrank(id, statusPrank) {
            try {
                await fetch(`${MOCKAPI_USERS_URL}/${id}`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prank: statusPrank })
                });
                loadTamuDariMockAPI();
            } catch (err) { alert("Gagal merubah status prank."); }
        }

        // 5. Hapus Tamu
        async function hapusUser(id) {
            if(!confirm("Hapus tamu ini dari database?")) return;
            try {
                await fetch(`${MOCKAPI_USERS_URL}/${id}`, { method: "DELETE" });
                loadTamuDariMockAPI();
            } catch (err) { alert("Gagal menghapus user."); }
        }

        // 6. Alur Upload QRIS
        async function uploadProses() {
            const fileInput = document.getElementById('file-qris');
            const statusMsg = document.getElementById('status-msg');
            const btnUpload = document.getElementById('btn-upload');
            
            if (!fileInput.files[0]) { alert('⚠️ Silakan pilih file gambarnya dahulu!'); return; }
            
            btnUpload.disabled = true;
            statusMsg.classList.remove('hidden', 'text-green-400', 'text-red-400');
            statusMsg.classList.add('text-yellow-400');
            statusMsg.innerText = "⚡ STEP 1: UPLOADING TO IMGBB...";

            const formData = new FormData();
            formData.append("image", fileInput.files[0]);

            try {
                const imgbbResp = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}&expiration=600`, { method: "POST", body: formData });
                const imgbbResult = await imgbbResp.json();
                if (!imgbbResult.success) throw new Error("ImgBB Failed");
                const directUrl = imgbbResult.data.url;

                statusMsg.innerText = "⚡ STEP 2: SAVING TO MOCKAPI...";

                const mockResp = await fetch(MOCKAPI_SETTING_URL, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ qris_url: directUrl })
                });

                if (!mockResp.ok) {
                    const urlUtama = MOCKAPI_SETTING_URL.replace('/1', '');
                    await fetch(urlUtama, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ id: "1", qris_url: directUrl })
                    });
                }

                document.getElementById('current-qris-preview').src = directUrl;
                statusMsg.classList.replace('text-yellow-400', 'text-green-400');
                statusMsg.innerText = "✅ QRIS DI DATABASE BERHASIL DIPERBARUI!";
                fileInput.value = "";
            } catch (error) {
                statusMsg.classList.replace('text-yellow-400', 'text-red-400');
                statusMsg.innerText = "❌ PROSES UPDATE GAGAL!";
            } finally { btnUpload.disabled = false; }
        }
    </script>
</body>
</html>
